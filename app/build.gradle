apply plugin: 'com.android.application'

android {
    namespace "com.ios.launcher"
    compileSdk 30

    defaultConfig {
        applicationId "com.ios.launcher"
        minSdk 21
        targetSdk 30
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.3.1'
}
